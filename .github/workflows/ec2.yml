 name:Deploy Backend to EC2
 on:
   push:
    branches: [main]
 jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
       - name: Build and push Docker image
         run: docker build -t ${{ secrets.DOCKER_USERNAME }}/backend-api:latest . && docker push ${{ secrets.DOCKER_USERNAME }}/backend-api:latest
       - name: SSH into EC2 and deploy
          uses: appleboy/ssh-action@v1
          with: 
            host: ${{ secrets.EC2_HOST }}
            username: ${{ secrets.EC2_USER }}
            key: ${{ secrets.EC2_KEY }}
            script: |
              cd/home/ubuntu/backend
              docker compose pull
              docker compose up -d
              










#secret is more secure than env variable as it is encrypted and not visible in logs. It is also more secure than hardcoding credentials in the code. It is recommended to use secrets for sensitive information like API keys, passwords, etc.